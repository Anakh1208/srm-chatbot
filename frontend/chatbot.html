<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kivy - SRM University Assistant</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #1e3c72 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 650px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        .chat-header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .chat-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .chat-header p {
            font-size: 13px;
            opacity: 0.9;
        }

        /* Quick Actions Menu */
        .quick-actions {
            background: #f8f9fa;
            padding: 10px;
            border-bottom: 2px solid #e0e0e0;
            overflow-x: auto;
            white-space: nowrap;
        }

        .quick-actions::-webkit-scrollbar {
            height: 4px;
        }

        .quick-actions::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 2px;
        }

        .action-btn {
            display: inline-block;
            padding: 8px 15px;
            margin-right: 8px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            color: #667eea;
            transition: all 0.3s;
        }

        .action-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-2px);
        }

        /* Chat Messages Area */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f7fb;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 3px;
        }

        /* Welcome Screen */
        .welcome-screen {
            text-align: center;
            padding: 20px;
        }

        .welcome-screen.hidden {
            display: none;
        }

        .welcome-title {
            font-size: 20px;
            color: #1e3c72;
            margin-bottom: 10px;
        }

        .welcome-subtitle {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .example-questions {
            display: grid;
            gap: 10px;
            margin-top: 20px;
        }

        .example-btn {
            padding: 12px 15px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            transition: all 0.3s;
            text-align: left;
        }

        .example-btn:hover {
            background: #f0f4ff;
            border-color: #667eea;
            transform: translateX(5px);
        }

        /* Messages */
        .message {
            margin-bottom: 20px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.bot .message-bubble {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .bot-name {
            font-weight: bold;
            color: #667eea;
            font-size: 12px;
            margin-bottom: 5px;
        }

        /* Sources */
        .sources {
            margin-top: 15px;
        }

        .sources-title {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            margin-bottom: 8px;
        }

        .source-card {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
            cursor: pointer;
            transition: all 0.3s;
        }

        .source-card:hover {
            background: #e8edff;
            transform: translateX(5px);
        }

        .source-title {
            font-size: 13px;
            font-weight: 600;
            color: #1e3c72;
            margin-bottom: 4px;
        }

        .source-url {
            font-size: 11px;
            color: #667eea;
            text-decoration: none;
            word-break: break-all;
        }

        .source-score {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
        }

        /* Confidence Badge */
        .confidence-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            margin-top: 8px;
            font-weight: 600;
        }

        .confidence-high {
            background: #d4edda;
            color: #155724;
        }

        .confidence-medium {
            background: #fff3cd;
            color: #856404;
        }

        .confidence-low {
            background: #f8d7da;
            color: #721c24;
        }

        /* Follow-up */
        .follow-up {
            margin-top: 15px;
            padding: 12px;
            background: #e8f5e9;
            border-radius: 8px;
        }

        .follow-up-title {
            font-size: 12px;
            color: #2e7d32;
            margin-bottom: 10px;
            font-style: italic;
        }

        .follow-up-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .follow-up-btn {
            padding: 8px 12px;
            background: white;
            border: 2px solid #4caf50;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            color: #2e7d32;
            transition: all 0.3s;
        }

        .follow-up-btn:hover {
            background: #4caf50;
            color: white;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            width: 60px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .typing-indicator.active {
            display: block;
        }

        .typing-indicator span {
            height: 8px;
            width: 8px;
            background: #667eea;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }

        /* Input Area */
        .chat-input {
            display: flex;
            padding: 15px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            border-color: #667eea;
        }

        #sendBtn {
            margin-left: 10px;
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s;
        }

        #sendBtn:hover {
            transform: scale(1.05);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Error Message */
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 0;
            }

            .chat-container {
                max-width: 100%;
                height: 100vh;
                border-radius: 0;
            }

            .follow-up-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <h1>🎓 SRM University Assistant</h1>
            <p>Ask me anything about SRM</p>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="action-btn" onclick="sendQuickAction('What programs does SRM offer?')">
                <i class="fas fa-book"></i> Programs
            </button>
            <button class="action-btn" onclick="sendQuickAction('How do I apply for admission?')">
                <i class="fas fa-file-alt"></i> Admissions
            </button>
            <button class="action-btn" onclick="sendQuickAction('Tell me about campus facilities')">
                <i class="fas fa-building"></i> Campus Info
            </button>
            <button class="action-btn" onclick="sendQuickAction('Information about placements')">
                <i class="fas fa-briefcase"></i> Placements
            </button>
            <button class="action-btn" onclick="sendQuickAction('Faculty information')">
                <i class="fas fa-user-tie"></i> Faculty
            </button>
            <button class="action-btn" onclick="sendQuickAction('Where is the library?')">
                <i class="fas fa-map-marker-alt"></i> Navigation
            </button>
            <button class="action-btn" onclick="sendQuickAction('Academia portal link')">
                <i class="fas fa-link"></i> Portals
            </button>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
            <!-- Welcome Screen -->
            <div class="welcome-screen" id="welcomeScreen">
                <h2 class="welcome-title">👋 Hey! I'm Kivy</h2>
                <p class="welcome-subtitle">Your friendly SRM University assistant. How can I help you today?</p>
                
                <div class="example-questions">
                    <button class="example-btn" onclick="sendExample('What programs does SRM offer?')">
                        📚 What programs does SRM offer?
                    </button>
                    <button class="example-btn" onclick="sendExample('How do I apply for admission?')">
                        📝 How do I apply for admission?
                    </button>
                    <button class="example-btn" onclick="sendExample('Campus facilities and amenities')">
                        🏫 Campus facilities and amenities
                    </button>
                    <button class="example-btn" onclick="sendExample('Placement statistics')">
                        💼 Placement statistics
                    </button>
                    <button class="example-btn" onclick="sendExample('Where is the library?')">
                        🗺️ Where is the library?
                    </button>
                    <button class="example-btn" onclick="sendExample('Academia portal links')">
                        🔗 Academia portal links
                    </button>
                    <button class="example-btn" onclick="sendExample('Faculty information')">
                        👨‍🏫 Faculty information
                    </button>
                    <button class="example-btn" onclick="sendExample('Hostel details')">
                        🏠 Hostel details
                    </button>
                </div>
            </div>

            <!-- Typing Indicator -->
            <div class="message bot">
                <div class="typing-indicator" id="typingIndicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Ask Kivy anything..." 
                onkeypress="handleKeyPress(event)"
            />
            <button id="sendBtn" onclick="sendMessage()">
                <i class="fas fa-paper-plane"></i> Send
            </button>
        </div>
    </div>

    <script>
        // API Configuration
        const getApiUrl = () => {
            const isLocalhost = window.location.hostname === 'localhost' || 
                               window.location.hostname === '127.0.0.1';
            
            return isLocalhost 
                ? 'http://localhost:8001/chat'
                : `${window.location.protocol}//${window.location.host}/api/chat`;
        };

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');
        const welcomeScreen = document.getElementById('welcomeScreen');

        let messageHistory = [];

        // Handle Enter key
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !sendBtn.disabled) {
                sendMessage();
            }
        }

        // Send quick action
        function sendQuickAction(query) {
            userInput.value = query;
            sendMessage();
        }

        // Send example
        function sendExample(query) {
            userInput.value = query;
            sendMessage();
        }

        // Main send message function
        async function sendMessage() {
            const message = userInput.value.trim();
            
            if (!message) return;

            // Hide welcome screen
            welcomeScreen.classList.add('hidden');

            // Disable input
            userInput.disabled = true;
            sendBtn.disabled = true;

            // Add user message
            addUserMessage(message);
            userInput.value = '';

            // Show typing indicator
            typingIndicator.classList.add('active');
            scrollToBottom();

            try {
                // Call API
                const response = await fetch(getApiUrl(), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ query: message })
                });

                if (!response.ok) {
                    throw new Error(`API returned ${response.status}`);
                }

                const data = await response.json();

                // Hide typing indicator
                typingIndicator.classList.remove('active');

                // Add bot response
                addBotMessage(data);

            } catch (error) {
                console.error('Error:', error);
                typingIndicator.classList.remove('active');
                
                addErrorMessage(
                    'Sorry, I encountered an error connecting to the server. ' +
                    'Please make sure the API is running on port 8001.'
                );
            }

            // Re-enable input
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        // Add user message
        function addUserMessage(text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message user';
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = text;
            
            messageDiv.appendChild(bubbleDiv);
            chatMessages.insertBefore(messageDiv, typingIndicator.parentElement);
            
            messageHistory.push({ role: 'user', content: text });
            scrollToBottom();
        }

        // Add bot message
        function addBotMessage(data) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            
            // Bot name
            const nameDiv = document.createElement('div');
            nameDiv.className = 'bot-name';
            nameDiv.textContent = 'Kivy';
            bubbleDiv.appendChild(nameDiv);
            
            // Answer
            const answerP = document.createElement('p');
            answerP.textContent = data.answer;
            bubbleDiv.appendChild(answerP);

            // Confidence badge
            if (data.confidence) {
                const badge = document.createElement('span');
                badge.className = `confidence-badge confidence-${data.confidence}`;
                badge.textContent = `${capitalize(data.confidence)} Confidence`;
                bubbleDiv.appendChild(badge);
            }

            // Sources
            if (data.sources && data.sources.length > 0) {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'sources';
                
                const sourcesTitle = document.createElement('div');
                sourcesTitle.className = 'sources-title';
                sourcesTitle.textContent = '📚 Sources:';
                sourcesDiv.appendChild(sourcesTitle);

                data.sources.forEach(source => {
                    const card = createSourceCard(source);
                    sourcesDiv.appendChild(card);
                });

                bubbleDiv.appendChild(sourcesDiv);
            }

            // Follow-up
            const followUp = createFollowUp();
            bubbleDiv.appendChild(followUp);
            
            messageDiv.appendChild(bubbleDiv);
            chatMessages.insertBefore(messageDiv, typingIndicator.parentElement);
            
            messageHistory.push({ role: 'bot', content: data });
            scrollToBottom();
        }

        // Create source card
        function createSourceCard(source) {
            const card = document.createElement('div');
            card.className = 'source-card';
            card.onclick = () => window.open(source.url, '_blank');
            
            const title = document.createElement('div');
            title.className = 'source-title';
            title.textContent = source.title;
            card.appendChild(title);
            
            const url = document.createElement('div');
            url.className = 'source-url';
            url.textContent = source.url;
            card.appendChild(url);
            
            if (source.relevance_score !== undefined) {
                const score = document.createElement('div');
                score.className = 'source-score';
                score.textContent = `Relevance: ${(source.relevance_score * 100).toFixed(0)}%`;
                card.appendChild(score);
            }
            
            return card;
        }

        // Create follow-up section
        function createFollowUp() {
            const followUpDiv = document.createElement('div');
            followUpDiv.className = 'follow-up';
            
            const title = document.createElement('div');
            title.className = 'follow-up-title';
            title.textContent = '💬 How else can I help you?';
            followUpDiv.appendChild(title);
            
            const buttonsDiv = document.createElement('div');
            buttonsDiv.className = 'follow-up-buttons';
            
            const options = [
                { text: '📚 More Programs', query: 'Tell me more about programs' },
                { text: '📝 Admission Details', query: 'Admission process' },
                { text: '🏫 Campus Tour', query: 'Campus facilities' },
                { text: '💼 Career Info', query: 'Placement details' }
            ];

            options.forEach(option => {
                const btn = document.createElement('button');
                btn.className = 'follow-up-btn';
                btn.textContent = option.text;
                btn.onclick = () => {
                    userInput.value = option.query;
                    sendMessage();
                };
                buttonsDiv.appendChild(btn);
            });

            followUpDiv.appendChild(buttonsDiv);
            return followUpDiv;
        }

        // Add error message
        function addErrorMessage(text) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${text}`;
            
            chatMessages.insertBefore(errorDiv, typingIndicator.parentElement);
            scrollToBottom();
        }

        // Scroll to bottom
        function scrollToBottom() {
            setTimeout(() => {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }, 100);
        }

        // Capitalize first letter
        function capitalize(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // Focus input on load
        window.addEventListener('load', () => {
            userInput.focus();
        });
    </script>
</body>
</html>
